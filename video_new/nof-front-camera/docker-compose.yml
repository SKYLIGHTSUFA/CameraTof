services:
  gige-hls-front:
    build: .
    image: gige-hls-front:latest
    platform: linux/amd64
    container_name: gige-hls-front
    restart: unless-stopped
    ports:
      - "443:4010"
    volumes:
      # Исходники фронта монтируются с хоста, чтобы обновлять UI без rebuild образа.
      - ./server.js:/app/server.js:ro
      - ./public:/app/public:ro
      # Та же папка, куда backend пишет HLS (в docker-compose backend: /mnt/test_ramdisk)
      - /mnt/test_ramdisk:/hls_output:ro
      # Список камер и секций из backend config.json
      - ../../config.json:/app/config.json:ro
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=4010
      - HLS_OUTPUT_DIR=/hls_output
      - CONFIG_FILE=/app/config.json
      - CAMERA_FOLDER_PREFIX=camera_
      - CHOKIDAR_USEPOLLING=true
      - AUTH_ADMIN_USER=Khomovskiy
      - AUTH_ADMIN_PASSWORD=Kh7!mP2#xL9@
      - FOAM_METRICS_ENABLED=false
      - FOAM_DB_HOST=postgres
      - FOAM_DB_PORT=5432
      - FOAM_DB_NAME=foam_v2
      - FOAM_DB_USER=postgres
      - FOAM_DB_PASSWORD=NoCh5ae5ahgh
    networks:
      - apps

networks:
  apps:
    name: apps
    external: true
