# Docker Compose для локального теста видеостены на Linux
# Без /mnt/test_ramdisk — использует ../../hls_output из репозитория
#
# Перед запуском:
#   VIDEO_FILE=sample.mp4 ../../scripts/mock-hls-cameras.sh --count 6
#   docker network create apps
#
# Запуск:
#   docker compose -f docker-compose.test.yml up -d --build

services:
  gige-hls-front:
    build: .
    image: gige-hls-front:latest
    platform: linux/amd64
    container_name: gige-hls-front-test
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ../../hls_output:/hls_output:ro
      - ../../config.json:/app/config.json:ro
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=4000
      - HLS_OUTPUT_DIR=/hls_output
      - CONFIG_FILE=/app/config.json
      - CAMERA_FOLDER_PREFIX=camera_
      - CHOKIDAR_USEPOLLING=true
      - FOAM_METRICS_ENABLED=false
    networks:
      - apps

networks:
  apps:
    name: apps
    external: true
